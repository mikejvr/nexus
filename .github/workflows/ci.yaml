name: NEXUS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          pip install pre-commit ruff pytest

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Run pipeline
        run: make pipeline

      - name: Drift detection
        run: make drift-check
